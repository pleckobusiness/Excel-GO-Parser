

services:
  excel-go-parser:
    build: .
    container_name: excel-go-parser
    ports:
      - "8002:8001"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://your-domain.example.com
      - N8N_PROTOCOL=https
      - N8N_HOST=your-domain.example.com
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
      - TZ=Europe/Zagreb
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped
