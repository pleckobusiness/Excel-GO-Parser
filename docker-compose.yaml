

services:
  sdk-mama-api:
    build: .
    container_name: sdk-mama-api-v2
    ports:
      - "8002:8001"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://bulk-preteen-margarine.ngrok-free.dev
      - N8N_PROTOCOL=https
      - N8N_HOST=bulk-preteen-margarine.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
      - TZ=Europe/Zagreb
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped
